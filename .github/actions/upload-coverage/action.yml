name: Upload coverage
description: Upload c8 coverage report as an artifact

inputs:
  name:
    description: Artifact name for this coverage report
    required: true

runs:
  using: composite
  steps:
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: coverage-${{ inputs.name }}
        path: coverage/lcov.info
        retention-days: 1
        if-no-files-found: error
