name: Setup Node.js with pnpm
description: Sets up pnpm, Node.js with caching, and installs dependencies

inputs:
  node-version:
    description: Node.js version
    required: false
    default: "24"
  working-directory:
    description: Working directory
    required: false
  download-build:
    description: Download build artifact
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # v5.0.0

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - run: pnpm install --frozen-lockfile
      shell: bash
      working-directory: ${{ inputs.working-directory || '.' }}

    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      if: inputs.download-build == 'true'
      with:
        name: build
        path: build/
