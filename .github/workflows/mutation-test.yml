name: mutation-testing

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"

jobs:
  mutation-testing:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:5.7.44
        ports:
          - "3306:3306"
        env:
          MYSQL_ROOT_PASSWORD: admin
          MYSQL_USER: username
          MYSQL_PASSWORD: password
          MYSQL_DATABASE: typeorm
      mariadb:
        image: mariadb:10.11.16
        ports:
          - "3307:3306"
        env:
          MYSQL_ROOT_PASSWORD: admin
          MYSQL_USER: username
          MYSQL_PASSWORD: password
          MYSQL_DATABASE: typeorm
      postgres:
        image: ghcr.io/typeorm/docker:postgres-17.9-postgis-3.6.2-pgvector-0.8.2
        ports:
          - "5432:5432"
        env:
          POSTGRES_USER: username
          POSTGRES_PASSWORD: password
          POSTGRES_DB: typeorm
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-node

      - run: |
          jq 'map(select(.type | IN($ARGS.positional[])))' \
            ormconfig.sample.json \
            --args \
              "better-sqlite3" \
              "mariadb" \
              "mysql" \
              "postgres" \
              "sqljs" \
            > ormconfig.json

      - run: pnpm exec stryker run
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutation-testing
          path: ./reports/mutation/mutation.html
