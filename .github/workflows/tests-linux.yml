name: tests-linux

on:
  workflow_call:
    inputs:
      node-version:
        required: true
        type: number

jobs:
  better-sqlite3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
        with:
          node-version: ${{ inputs.node-version }}
          download-build: true

      - run: jq 'map(select(.type == "better-sqlite3"))' ormconfig.sample.json > ormconfig.json
      - run: pnpm exec c8 pnpm run test:ci

      - uses: ./.github/actions/upload-coverage
        with:
          name: better-sqlite3-node-${{ inputs.node-version }}-linux

  cockroachdb:
    if: ${{ inputs.node-version >= 24 }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6]
    env:
      TOTAL_SHARDS: 6
    services:
      cockroachdb:
        image: cockroachdb/cockroach:v24.3.8
        ports:
          - "26257:26257"
        env:
          COCKROACH_ARGS: "start-single-node --insecure --cache=1GB --store=type=mem,size=4GB"
        options: >-
          --health-cmd "cockroach sql --insecure -e 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
        with:
          node-version: ${{ inputs.node-version }}
          download-build: true

      - run: jq 'map(select(.type == "cockroachdb"))' ormconfig.sample.json > ormconfig.json

      - name: Split test files for shard ${{ matrix.shard }}/${{ env.TOTAL_SHARDS }}
        run: |
          find build/compiled/test -name "*.test.js" | sort | awk "NR % $TOTAL_SHARDS == ${{ matrix.shard }} - 1" \
            | jq -R -s 'split("\n") | map(select(length > 0))' \
            | jq -s '.[0] as $files | .[1] | .spec = $files | .recursive = false' - .mocharc.json > .mocharc.${{ matrix.shard }}.json

          echo "Shard ${{ matrix.shard }}/$TOTAL_SHARDS: $(jq '.spec | length' .mocharc.${{ matrix.shard }}.json) test files"

      - run: pnpm exec c8 mocha --bail --config .mocharc.${{ matrix.shard }}.json

      - uses: ./.github/actions/upload-coverage
        with:
          name: cockroachdb-${{ matrix.shard }}-node-${{ inputs.node-version }}-linux

  mongodb:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:8.2.5
        ports:
          - "27017:27017"
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
        with:
          node-version: ${{ inputs.node-version }}
          download-build: true

      - run: jq 'map(select(.type == "mongodb"))' ormconfig.sample.json > ormconfig.json
      - run: pnpm exec c8 pnpm run test:ci

      - uses: ./.github/actions/upload-coverage
        with:
          name: mongodb-node-${{ inputs.node-version }}-linux

  mssql:
    runs-on: ubuntu-latest
    services:
      mssql:
        image: "mcr.microsoft.com/mssql/server:2025-latest"
        ports:
          - "1433:1433"
        env:
          SA_PASSWORD: Admin12345
          ACCEPT_EULA: Y
          MSSQL_PID: Express
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
        with:
          node-version: ${{ inputs.node-version }}
          download-build: true

      - run: jq 'map(select(.type == "mssql"))' ormconfig.sample.json > ormconfig.json
      - run: pnpm exec c8 pnpm run test:ci

      - uses: ./.github/actions/upload-coverage
        with:
          name: mssql-node-${{ inputs.node-version }}-linux

  mysql_mariadb:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:5.7.44
        ports:
          - "3306:3306"
        env:
          MYSQL_ROOT_PASSWORD: admin
          MYSQL_USER: username
          MYSQL_PASSWORD: password
          MYSQL_DATABASE: typeorm
      mariadb:
        image: mariadb:10.11.16
        ports:
          - "3307:3306"
        env:
          MYSQL_ROOT_PASSWORD: admin
          MYSQL_USER: username
          MYSQL_PASSWORD: password
          MYSQL_DATABASE: typeorm
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
        with:
          node-version: ${{ inputs.node-version }}
          download-build: true

      - run: |
          jq 'map(select(.type | IN($ARGS.positional[])))' \
            ormconfig.sample.json \
            --args \
              "mariadb" \
              "mysql" \
            > ormconfig.json
      - run: pnpm exec c8 pnpm run test:ci
      - uses: ./.github/actions/upload-coverage
        with:
          name: mysql_mariadb-node-${{ inputs.node-version }}-linux

  mysql_mariadb_latest:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:9.5.0
        ports:
          - "3306:3306"
        env:
          MYSQL_ROOT_PASSWORD: admin
          MYSQL_USER: username
          MYSQL_PASSWORD: password
          MYSQL_DATABASE: typeorm
      mariadb:
        image: mariadb:12.2.2
        ports:
          - "3307:3306"
        env:
          MYSQL_ROOT_PASSWORD: admin
          MYSQL_USER: username
          MYSQL_PASSWORD: password
          MYSQL_DATABASE: typeorm
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
        with:
          node-version: ${{ inputs.node-version }}
          download-build: true

      - run: |
          jq 'map(select(.type | IN($ARGS.positional[])))' \
            ormconfig.sample.json \
            --args \
              "mariadb" \
              "mysql" \
            > ormconfig.json
      - run: pnpm exec c8 pnpm run test:ci
      - uses: ./.github/actions/upload-coverage
        with:
          name: mysql_mariadb_latest-node-${{ inputs.node-version }}-linux

  oracle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - run: docker compose up oracle --detach

      - uses: ./.github/actions/setup-node
        with:
          node-version: ${{ inputs.node-version }}
          download-build: true

      - run: jq 'map(select(.type == "oracle"))' ormconfig.sample.json > ormconfig.json
      - run: docker compose up oracle --no-recreate --wait
      - run: sleep 3 # wait for oracle to be fully ready
      - run: pnpm exec c8 pnpm run test:ci

      - uses: ./.github/actions/upload-coverage
        with:
          name: oracle-node-${{ inputs.node-version }}-linux

  postgres:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        postgres-version: ["14.22", "17.9"]

    services:
      postgres:
        image: ghcr.io/typeorm/docker:postgres-${{ matrix.postgres-version }}-postgis-3.6.2-pgvector-0.8.2
        ports:
          - "5432:5432"
        env:
          POSTGRES_USER: username
          POSTGRES_PASSWORD: password
          POSTGRES_DB: typeorm
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
        with:
          node-version: ${{ inputs.node-version }}
          download-build: true

      - run: jq 'map(select(.type == "postgres"))' ormconfig.sample.json > ormconfig.json
      - run: pnpm exec c8 pnpm run test:ci

      - uses: ./.github/actions/upload-coverage
        with:
          name: postgres-${{ matrix.postgres-version }}-node-${{ inputs.node-version }}-linux

  sap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - run: docker compose up hanaexpress --detach

      - uses: ./.github/actions/setup-node
        with:
          node-version: ${{ inputs.node-version }}
          download-build: true

      - run: jq 'map(select(.type == "sap"))' ormconfig.sample.json > ormconfig.json
      - run: docker compose up hanaexpress --no-recreate --wait
      - run: pnpm exec c8 pnpm run test:ci

      - uses: ./.github/actions/upload-coverage
        with:
          name: sap-node-${{ inputs.node-version }}-linux

  spanner:
    runs-on: ubuntu-latest
    services:
      spanner:
        image: roryq/spanner-emulator:latest
        ports:
          - "9010:9010"
          - "9020:9020"
        env:
          SPANNER_PROJECT_ID: typeorm
          SPANNER_INSTANCE_ID: typeorm
          SPANNER_DATABASE_ID: typeorm
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
        with:
          node-version: ${{ inputs.node-version }}
          download-build: true

      - run: jq 'map(select(.type == "spanner"))' ormconfig.sample.json > ormconfig.json

      - name: healthcheck
        run: |
          timeout 30 bash -c 'until curl -sf http://localhost:9020/v1/projects/typeorm/instances/typeorm/databases/typeorm > /dev/null; do sleep 1; done'

      - run: pnpm exec c8 pnpm run test:ci

      - uses: ./.github/actions/upload-coverage
        with:
          name: spanner-node-${{ inputs.node-version }}-linux
  sqljs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
        with:
          node-version: ${{ inputs.node-version }}
          download-build: true

      - run: jq 'map(select(.type == "sqljs"))' ormconfig.sample.json > ormconfig.json
      - run: pnpm exec c8 pnpm run test:ci

      - uses: ./.github/actions/upload-coverage
        with:
          name: sqljs-node-${{ inputs.node-version }}-linux
